# https://taskfile.dev

version: "3"

dotenv:
  - .env

tasks:
  docker-build:
    desc: Build the format image
    cmds:
      - docker build -t "${FORMAT_IMAGE:-ghcr.io/fanyang89/clang-format:18}" .

  fmt:
    desc: Format all C++ source files with clang-format (via Docker)
    platforms: [linux, darwin]
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: "docker is required. Run 'task docker-build' first."
    cmds:
      - ./scripts/clang-format.sh fmt

  check-fmt:
    desc: Check formatting without modifying files (via Docker)
    platforms: [linux, darwin]
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: "docker is required. Run 'task docker-build' first."
    cmds:
      - ./scripts/clang-format.sh check

  cmake:
    desc: Configure CMake with debug preset
    cmds:
      - cmake --preset=Debug -B build

  build:
    desc: Build all targets
    deps:
      - cmake
    cmds:
      - cmake --build build

  test:
    desc: Build and run all tests
    deps:
      - build
    cmds:
      - ctest --test-dir build --output-on-failure

  proto3-wire-test:
    desc: Run proto3 wire compatibility test
    aliases:
      - pwt
    deps:
      - build
    cmds:
      - ctest --test-dir build --output-on-failure --tests-regex grpc_lite_proto3_wire_test

  core-test:
    desc: Run core unit tests
    aliases:
      - core
    deps:
      - build
    cmds:
      - ctest --test-dir build --output-on-failure --tests-regex grpc_lite_core_test

  runtime-test:
    desc: Run runtime lifecycle and integration tests
    aliases:
      - rt
    deps:
      - build
    cmds:
      - ctest --test-dir build --output-on-failure --tests-regex grpc_lite_runtime_test

  protocol-test:
    desc: Run HTTP/2 protocol behavior tests
    aliases:
      - pt
    deps:
      - build
    cmds:
      - ctest --test-dir build --output-on-failure --tests-regex 'grpc_lite_protocol_.*_test'

  compatibility-test:
    desc: Run grpc-lite/grpcpp compatibility test
    aliases:
      - ct
    deps:
      - build
    cmds:
      - ctest --test-dir build --output-on-failure --tests-regex grpc_lite_compatibility_test

  test-asan:
    desc: Build and run tests with ASan
    cmds:
      - cmake -E rm -rf build-asan
      - cmake --preset=Debug -B build-asan ${TOOLCHAIN:+-DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN}} -DGRPC_LITE_SANITIZE=address
      - cmake --build build-asan
      - ctest --test-dir build-asan --output-on-failure

  test-tsan:
    desc: Build and run tests with TSan
    cmds:
      - cmake -E rm -rf build-tsan
      - cmake --preset=Debug -B build-tsan ${TOOLCHAIN:+-DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN}} -DGRPC_LITE_SANITIZE=thread
      - cmake --build build-tsan
      - ctest --test-dir build-tsan --output-on-failure

  test-release:
    desc: Build and run tests with release preset
    cmds:
      - cmake -E rm -rf build-release
      - cmake --preset=Release -B build-release ${TOOLCHAIN:+-DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN}}
      - cmake --build build-release
      - ctest --test-dir build-release --output-on-failure

  test-all:
    desc: Build and run ASan, TSan, and release tests
    aliases:
      - ta
    cmds:
      - task: test-asan
      - task: test-tsan
      - task: test-release

  coverage:
    desc: Get test coverage report (using llvm-cov)
    env:
      LLVM_PROFILE_FILE: build/grpc-lite-%p.profraw
    vars:
      PROF_DATA: build/coverage.profdata
      REPORT_DIR: build/coverage-report
      BINS: ./build/grpc_lite_proto3_wire_test -object ./build/grpc_lite_core_test -object ./build/grpc_lite_runtime_test -object ./build/grpc_lite_protocol_test -object ./build/grpc_lite_compatibility_test
      IGNORE: (tests|third_party|golden|\.pb\.)
    cmds:
      - cmake -E rm -rf build
      - cmake --preset=Coverage -B build -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN:-cmake/clang-toolchain.cmake}
      - cmake --build build
      - rm -f build/*.profraw {{.PROF_DATA}}
      - ctest --test-dir build --output-on-failure
      - llvm-profdata merge -sparse build/*.profraw -o {{.PROF_DATA}}
      - >
        llvm-cov show
        {{.BINS}}
        -instr-profile={{.PROF_DATA}}
        -format=html
        -output-dir={{.REPORT_DIR}}
        -ignore-filename-regex='{{.IGNORE}}'
        -show-instantiations=false
      - llvm-cov report {{.BINS}} -instr-profile={{.PROF_DATA}} -ignore-filename-regex='{{.IGNORE}}'
      - echo "Coverage report generated at {{.REPORT_DIR}}/index.html"

  lint:
    desc: Run lint tools
    cmds:
      - cppcheck include src tests examples

  analyze:
    desc: Run clang static analyzer using scan-build
    cmds:
      - rm -rf build
      - cmake --preset=Debug -B build -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN:-cmake/clang-toolchain.cmake}
      - >
        scan-build
        -enable-checker core
        -enable-checker cplusplus
        -enable-checker deadcode
        -enable-checker security
        -enable-checker unix
        -enable-checker optin.core.EnumCastOutOfRange
        -enable-checker optin.cplusplus.UninitializedObject
        -enable-checker optin.cplusplus.VirtualCall
        -enable-checker optin.performance.Padding
        -enable-checker optin.taint.GenericTaint
        -enable-checker alpha.core.Conversion
        -enable-checker alpha.core.PointerArithm
        -enable-checker alpha.cplusplus.InvalidatedIterator
        -enable-checker alpha.cplusplus.IteratorRange
        -enable-checker alpha.unix.PthreadLock
        -enable-checker alpha.deadcode.UnreachableCode
        ninja -C build

  iwyu:
    desc: Run include-what-you-use on project targets
    cmds:
      - cmake -E rm -rf build-iwyu
      - cmake --preset=Debug -B build-iwyu -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN:-cmake/clang-toolchain.cmake} -DGRPC_LITE_ENABLE_IWYU=ON
      - cmake --build build-iwyu --clean-first

  clean:
    desc: Clear local build directories
    cmds:
      - rm -rf ./build ./build-*
