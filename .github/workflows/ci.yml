name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Check formatting
        run: mise run fmt-check

      - name: Validate workflows
        run: mise run ci-lint

  core-test:
    name: Core (${{ matrix.arch }}, ${{ matrix.optimize }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
            optimize: Debug
          - runner: ubuntu-24.04
            arch: x64
            optimize: ReleaseSafe
          - runner: ubuntu-24.04-arm
            arch: arm64
            optimize: Debug
          - runner: ubuntu-24.04-arm
            arch: arm64
            optimize: ReleaseSafe
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}

      - name: Test
        run: zig build test -Doptimize=${{ matrix.optimize }} --summary all

  package-consumer:
    name: Package consumer
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout without submodules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Build raw package consumer
        run: mise run test-consumer

  interop:
    name: Interop (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
            run_edge: true
          - runner: ubuntu-24.04-arm
            arch: arm64
            run_edge: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Run grpcurl interop
        run: mise run interop

      - name: Run official unary interop
        run: mise run interop-official

      - name: Run official HTTP/2 framing report
        run: mise run interop-http2

      - name: Run official HTTP/2 edge cases
        if: matrix.run_edge
        run: mise run interop-http2-edge

      - name: Upload interop reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: interop-reports-${{ matrix.arch }}
          path: .zig-cache/official/*.log
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  required:
    name: Required
    if: always()
    needs:
      - workflow-lint
      - core-test
      - package-consumer
      - interop
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify required jobs
        env:
          WORKFLOW_LINT_RESULT: ${{ needs.workflow-lint.result }}
          CORE_TEST_RESULT: ${{ needs.core-test.result }}
          PACKAGE_CONSUMER_RESULT: ${{ needs.package-consumer.result }}
          INTEROP_RESULT: ${{ needs.interop.result }}
        run: |
          test "$WORKFLOW_LINT_RESULT" = success
          test "$CORE_TEST_RESULT" = success
          test "$PACKAGE_CONSUMER_RESULT" = success
          test "$INTEROP_RESULT" = success
